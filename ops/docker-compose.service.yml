services:
  # Backend API Gateway - NestJS
  transcendence_api_gateway:
    build:
      context: ../backend/api/transcendence-api-gateway
      dockerfile: Dockerfile
    container_name: transcendence_api_gateway
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
    restart: always
    networks:
      - transcendence-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
  transcendence_oauth_service:
    build:
      context: ../backend/api/oauth-service
      dockerfile: Dockerfile
    container_name: transcendence_oauth_service
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - PORT=8080
    restart: always
    networks:
      - transcendence-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
  # Frontend - Next.js
  transcendence_frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: transcendence_frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - NEXT_PUBLIC_API_URL=http://transcendence_api_gateway:4000
    depends_on:
      - transcendence_api_gateway
    restart: always
    networks:
      - transcendence-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
  transcendence_user_management:
    build:
      context: ../backend/services/user-management
      dockerfile: Dockerfile
    container_name: transcendence_user_management
    ports:
      - "${USER_PORT:-4002}:4002"
    volumes:
      - user-management-avatars:/app/uploads/avatars
    environment:
      - NODE_ENV=production
      - PORT=4002
      - DB_HOST=transcendence_database_postgres
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER:-transcendence}
      - DB_PASSWORD=${DATABASE_PASSWORD:-transcendence_prod}
      - DB_NAME=${POSTGRES_DB:-transcendence_prod}
      - JWT_SECRET=${JWT_SECRET:-super_secret_jwt_key_change_me_in_production}
    restart: always
    networks:
      - transcendence-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s


networks:
  transcendence-network:
    name: transcendence-network
    driver: bridge

volumes:
  user-management-avatars:
