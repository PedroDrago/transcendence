services:
  # Frontend - Next.js
  frontend:
    image: node:20-alpine
    container_name: transcendence-frontend-dev
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ../frontend:/app
      - frontend-node-modules:/app/node_modules
    environment:
      - NODE_ENV=development
    command: sh -c "[ -x node_modules/.bin/next ] || npm ci --include=dev; npm run dev"
    restart: unless-stopped
    networks:
      - transcendence-network

  # Backend - NestJS API Gateway
  backend:
    image: node:20-alpine
    container_name: transcendence-backend-dev
    working_dir: /app
    ports:
      - "4000:4000"
    volumes:
      - ../backend/api/transcendence-api-gateway:/app
      - backend-node-modules:/app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=4000
    command: sh -c "[ -x node_modules/.bin/nest ] || npm ci --include=dev; npm run start:dev"
    restart: unless-stopped
    networks:
      - transcendence-network
    depends_on:
      - database

  # Auth Service - NestJS
  auth-service:
    image: node:20-alpine
    container_name: transcendence-auth-dev
    working_dir: /app
    ports:
      - "4001:4001"
    volumes:
      - ../backend/services/auth:/app
      - auth-node-modules:/app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=4001
      - JWT_SECRET=${JWT_SECRET:-dev_secret_change_me}
      - JWT_EXPIRES_IN=1h
      - DB_HOST=database
      - DB_PORT=5432
      - DB_USER=transcendence
      - DB_PASSWORD=transcendence_dev
      - DB_NAME=transcendence_dev
    command: sh -c "[ -x node_modules/.bin/nest ] || npm ci --include=dev; npm run start:dev"
    restart: unless-stopped
    networks:
      - transcendence-network
    depends_on:
      database:
        condition: service_healthy

  # Chat Service - Phoenix/Elixir
  chat-service:
    build:
      context: ../backend/services/chat
      dockerfile: Dockerfile.dev
    container_name: transcendence-chat-dev
    ports:
      - "4002:4002"
    volumes:
      - ../backend/services/chat:/app
      - /app/deps
      - /app/_build
    environment:
      - MIX_ENV=dev
      - PORT=4002
      - PHX_IP=0.0.0.0
      - PHX_SERVER=true
      - DB_HOST=database
      - DB_PORT=5432
      - DB_USER=transcendence
      - DB_PASSWORD=transcendence_dev
      - DB_NAME=transcendence_dev
      - MIX_ENV=dev
      - PORT=4002
      - PHX_IP=0.0.0.0
      - PHX_SERVER=true
    command: sh -c "mix deps.get && mix deps.compile && mix ecto.create && mix ecto.migrate && mix phx.server"
    depends_on:
      database:
        condition: service_healthy    
    restart: unless-stopped
    networks:
      - transcendence-network

  # Database - PostgreSQL
  database:
    image: postgres:16-alpine
    container_name: transcendence-db-dev
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=transcendence
      - POSTGRES_PASSWORD=transcendence_dev
      - POSTGRES_DB=transcendence_dev
    volumes:
      - postgres-data-dev:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - transcendence-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U transcendence -d transcendence_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

networks:
  transcendence-network:
    driver: bridge

volumes:
  postgres-data-dev:
  frontend-node-modules:
  backend-node-modules:
  auth-node-modules:
