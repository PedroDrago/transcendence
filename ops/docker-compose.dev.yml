services:
  # Frontend - Next.js
  frontend:
    image: node:20-alpine
    container_name: transcendence-frontend-dev
    working_dir: /app
    ports:
      - "${FRONTEND_PORT}:${FRONTEND_PORT}"
    volumes:
      - ../frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=${FRONTEND_PORT}
    command: sh -c "npm install && npm run dev"
    restart: unless-stopped
    networks:
      - transcendence-network

  # Backend - NestJS API Gateway
  backend:
    image: node:20-alpine
    container_name: transcendence-backend-dev
    working_dir: /app
    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"
    volumes:
      - ../backend/api/transcendence-api-gateway:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=${BACKEND_PORT}
      - JWT_SECRET=${JWT_SECRET}
    command: sh -c "npm install && npm run start:dev"
    restart: unless-stopped
    networks:
      - transcendence-network
    depends_on:
      - database

  # Auth Service - NestJS
  auth-service:
    image: node:20-alpine
    container_name: transcendence-auth-dev
    working_dir: /app
    ports:
      - "${AUTH_PORT}:${AUTH_PORT}"
    volumes:
      - ../backend/services/auth:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=${AUTH_PORT}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN}
      - FRONTEND_ORIGIN=${FRONTEND_ORIGIN}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - DB_HOST=${DB_HOST}
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_NAME=${POSTGRES_DB}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_CALLBACK_URL=${GOOGLE_CALLBACK_URL}
      - GOOGLE_TEST_CALLBACK_URL=${GOOGLE_TEST_CALLBACK_URL}
      - FRONTEND_OAUTH_SUCCESS_URL=${FRONTEND_OAUTH_SUCCESS_URL}
    command: sh -c "npm install && npm run start:dev"
    restart: unless-stopped
    networks:
      - transcendence-network
    depends_on:
      - database

  # Chat Service - Phoenix/Elixir
  chat-service:
    build:
      context: ../backend/services/chat
      dockerfile: Dockerfile.dev
    container_name: transcendence-chat-dev
    ports:
      - "${CHAT_PORT:-4002}:${CHAT_PORT:-4002}"
    volumes:
      - ../backend/services/chat:/app
      - /app/deps
      - /app/_build
    environment:
      - MIX_ENV=dev
      - PORT=${CHAT_PORT:-4002}
      - PHX_IP=0.0.0.0
      - PHX_SERVER=true
      - DB_HOST=${DB_HOST}
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_NAME=${POSTGRES_DB}
    command: sh -c "mix deps.get && mix deps.compile && mix ecto.create && mix ecto.migrate && mix phx.server"
    depends_on:
      database:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - transcendence-network

  # Database - PostgreSQL
  database:
    image: postgres:16-alpine
    container_name: transcendence-db-dev
    ports:
      - "${DB_HOST_PORT}:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres-data-dev:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    networks:
      - transcendence-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # User Management Service - NestJS
  user-service:
    image: node:22-alpine
    container_name: transcendence-user-dev
    working_dir: /app
    ports:
      - "${USER_PORT}:${USER_PORT}"
    volumes:
      - ../backend/services/user-management:/app
      - /app/node_modules
      - user-management-avatars:/app/uploads/avatars
    command: sh -c "apk add --no-cache netcat-openbsd && npm install && sh ./entrypoint.sh"
    environment:
      - NODE_ENV=development
      - PORT=${USER_PORT}
      - DB_HOST=${DB_HOST}
      - DB_PORT=5432 # TODO: change to env var
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_NAME=${POSTGRES_DB}
      - JWT_SECRET=${JWT_SECRET}
    restart: unless-stopped
    networks:
      - transcendence-network
    depends_on:
      - database
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:${USER_PORT}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  transcendence-network:
    driver: bridge

volumes:
  postgres-data-dev:
  user-management-avatars:
