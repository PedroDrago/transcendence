services:
  # Frontend - Next.js
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: transcendence-frontend-prod
    ports:
      - "${FRONTEND_PORT}:${FRONTEND_PORT}"
      - "${FRONTEND_PORT}:${FRONTEND_PORT}"
    environment:
      - NODE_ENV=production
      - PORT=${FRONTEND_PORT}
      - PORT=${FRONTEND_PORT}
    restart: always
    networks:
      - transcendence-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:' + process.env.PORT + '/login', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:' + process.env.PORT + '/login', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Backend - NestJS API Gateway
  backend:
    build:
      context: ../backend/api/transcendence-api-gateway
      dockerfile: Dockerfile
    container_name: transcendence-backend-prod
    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"
      - "${BACKEND_PORT}:${BACKEND_PORT}"
    environment:
      - NODE_ENV=production
      - PORT=${BACKEND_PORT}
      - JWT_SECRET=${JWT_SECRET}
      - PORT=${BACKEND_PORT}
      - JWT_SECRET=${JWT_SECRET}
    restart: always
    networks:
      - transcendence-network
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:${BACKEND_PORT}/health"]
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:${BACKEND_PORT}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Auth Service - NestJS
  auth-service:
    build:
      context: ../backend/services/auth
      dockerfile: Dockerfile
    container_name: transcendence-auth-prod
    ports:
      - "${AUTH_PORT}:${AUTH_PORT}"
      - "${AUTH_PORT}:${AUTH_PORT}"
    environment:
      - NODE_ENV=production
      - PORT=${AUTH_PORT}
      - PORT=${AUTH_PORT}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN}
      - FRONTEND_ORIGIN=${FRONTEND_ORIGIN}
      - DB_HOST=${DB_HOST}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN}
      - FRONTEND_ORIGIN=${FRONTEND_ORIGIN}
      - DB_HOST=${DB_HOST}
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_NAME=${POSTGRES_DB}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_CALLBACK_URL=${GOOGLE_CALLBACK_URL}
      - GOOGLE_TEST_CALLBACK_URL=${GOOGLE_TEST_CALLBACK_URL}
      - FRONTEND_OAUTH_SUCCESS_URL=${FRONTEND_OAUTH_SUCCESS_URL}
    restart: always
    networks:
      - transcendence-network
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:${AUTH_PORT}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Chat Service - Phoenix/Elixir
  chat-service:
    build:
      context: ../backend/services/chat
      dockerfile: Dockerfile
    container_name: transcendence-chat-prod
    ports:
      - "${CHAT_PORT:-4002}:${CHAT_PORT:-4002}"
    environment:
      - MIX_ENV=prod
      - PORT=${CHAT_PORT:-4002}
      - PHX_IP=0.0.0.0
      - PHX_SERVER=true
      - DB_HOST=${DB_HOST}
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_NAME=${POSTGRES_DB}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_CALLBACK_URL=${GOOGLE_CALLBACK_URL}
      - GOOGLE_TEST_CALLBACK_URL=${GOOGLE_TEST_CALLBACK_URL}
      - FRONTEND_OAUTH_SUCCESS_URL=${FRONTEND_OAUTH_SUCCESS_URL}
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_NAME=${POSTGRES_DB}
    restart: always
    networks:
      - transcendence-network
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:${AUTH_PORT}/health"]
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:${CHAT_PORT:-4002}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Database - PostgreSQL
  database:
    image: postgres:16-alpine
    container_name: transcendence-db-prod
    ports:
      - "${DB_HOST_PORT}:5432"
      - "${DB_HOST_PORT}:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres-data-prod:/var/lib/postgresql/data
    restart: always
    networks:
      - transcendence-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  transcendence-network:
    driver: bridge

volumes:
  postgres-data-prod:
