services:
  # Backend API Gateway - NestJS
  transcendence_api_gateway:
    build:
      context: ../backend/api/transcendence-api-gateway
      dockerfile: Dockerfile
    container_name: transcendence_api_gateway
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
    restart: always
    networks:
      - transcendence-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend - Next.js
  transcendence_frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: transcendence_frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - NEXT_PUBLIC_API_URL=http://transcendence_api_gateway:4000
    depends_on:
      - transcendence_api_gateway
    restart: always
    networks:
      - transcendence-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  transcendence-network:
    name: transcendence-network
    driver: bridge

