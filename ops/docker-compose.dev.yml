services:
  # Database - PostgreSQL
  database:
    image: postgres:16-alpine
    container_name: transcendence-db-prod
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=transcendence
      - POSTGRES_PASSWORD=${DATABASE_PASSWORD:-transcendence_prod}
      - POSTGRES_DB=transcendence_prod
    volumes:
      - postgres-data-prod:/var/lib/postgresql/data
    restart: always
    networks:
      - transcendence-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U transcendence"]
      interval: 10s
      timeout: 5s
      retries: 5

  grafana:
      image: grafana/grafana
      ports:
        - '5001:3000'
      environment:
        - GF_SECURITY_ADMIN_USER=admin
        - GF_SECURITY_ADMIN_PASSWORD=admin
      networks:
        - transcendence-network
      volumes:
        - grafana-data-prod:/var/lib/grafana

networks:
  transcendence-network:
    driver: host

volumes:
  postgres-data-prod:
  grafana-data-prod:
