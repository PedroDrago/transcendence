services:
  # User Management Service - NestJS (Development mode)
  transcendence_user_management:
    image: node:22-alpine
    container_name: transcendence_user_management_dev
    working_dir: /app
    ports:
      - "${USER_PORT:-4002}:4002"
    volumes:
      - ../backend/services/user-management:/app
      - /app/node_modules
    command: sh -c "npm install && npm run migration:run && npm run start:dev"
    environment:
      - NODE_ENV=development
      - PORT=4002
      - DB_HOST=transcendence_database_postgres
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER:-transcendence}
      - DB_PASSWORD=${DATABASE_PASSWORD:-transcendence_prod}
      - DB_NAME=${POSTGRES_DB:-transcendence_prod}
      - JWT_SECRET=${JWT_SECRET:-super_secret_jwt_key_change_me_in_production}
    restart: unless-stopped
    networks:
      - transcendence-network
    depends_on:
      - transcendence_database_postgres
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  transcendence-network:
    name: transcendence-network
    driver: bridge
