version: '8'
services:
  transcendence_elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
    container_name: transcendence_elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
    ports:
      - "9200:9200"

  transcendence_logstash:
    image: docker.elastic.co/logstash/logstash:8.17.0
    container_name: transcendence_logstash
    volumes:
      - ./config/logstash/logstash.conf:/usr/share/logstash/pipeline/logstash.conf
    ports:
      - "5044:5044"
    depends_on:
      - transcendence_elasticsearch

  transcendence_kibana:
    image: docker.elastic.co/kibana/kibana:8.17.0
    container_name: transcendence_kibana
    ports:
      - "5601:5601"
    depends_on:
      - transcendence_elasticsearch

  transcendence_prometheus:
    image: prom/prometheus:latest
    container_name: transcendence_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data-dev:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  transcendence_grafana:
    image: grafana/grafana
    container_name: transcendence_grafana
    ports:
      - '5001:3000'
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-data-dev:/var/lib/grafana
    depends_on:
      - transcendence_prometheus

networks:
  transcendence-network:
    name: transcendence-network
    driver: bridge

volumes:
  prometheus-data-dev:
  grafana-data-dev: